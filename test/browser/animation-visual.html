<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ol-engine animation visual regression</title>
    <style>
      :root {
        color-scheme: light;
        --page-background: #e8eef5;
        --map-background: #f8fafc;
        --map-border: #94a3b8;
      }

      :root[data-theme='dark'] {
        color-scheme: dark;
        --page-background: #020617;
        --map-background: #07111f;
        --map-border: #334155;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--page-background);
      }

      body {
        display: grid;
        place-items: center;
      }

      #map {
        box-sizing: border-box;
        width: 640px;
        height: 360px;
        overflow: hidden;
        border: 1px solid var(--map-border);
        background: var(--map-background);
      }

      #map .ol-viewport,
      #map canvas {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="map" data-testid="animation-map"></div>
    <script type="module" src="/animation-visual.ts"></script>
  </body>
</html>
